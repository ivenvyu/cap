metadata:
  spec_version: v2.2.1
  phase_introduced: phase_1b
  status: active
  decision_log: docs/design_history/phase_1b_classifier_smoke_summary.md
  superseded_by: null
name: diagnostic_claim_support_v1
description: 'Phase 1b에서 내린 운영/진단 판단이 어떤 관측에 의해 지지되고, 어떤 추가 관측이 그 판단을 강화하거나 약화시키는지 기록하기 위한 claim-level diagnostic support
  policy. 이는 candidate-level support explanation이 아니다.

  '
scope:
  support_level: claim_level
  excluded_level: candidate_level
  explanation_target: project_decision_or_diagnostic_claim
  score_status: diagnostic_only
  threshold_status: diagnostic_trigger_only_not_final_threshold
non_reduction_rules:
- candidate_accept_reject_explanation으로 사용하지 않는다.
- feature coefficient를 explanation으로 사용하지 않는다.
- calibrated threshold 또는 final pass/fail rule로 사용하지 않는다.
- diagnostic trigger는 후속 검토 신호이지 자동 판정 기준이 아니다.
- candidate-level support explanation은 Phase 3~4까지 defer한다.
threshold_status_semantics:
  diagnostic_trigger_only_not_final_threshold:
    meaning: '관측값이 나오면 후속 행동을 검토하는 diagnostic trigger다. calibrated threshold 또는 final pass/fail 기준이 아니다.

      '
    requires_next_action: true
  diagnostic_distribution_audit_only:
    meaning: '분포를 관찰하고 다음 audit에서 비교하기 위한 monitor signal이다. 즉시 행동을 요구하지 않는다.

      '
    requires_next_action: false
    default_next_action: record_and_compare_in_next_audit
  diagnostic_trend_audit_only:
    meaning: '반복 실행에서 같은 방향의 패턴이 재현되는지 보는 trend signal이다. 단일 관측으로 결론 내리지 않는다.

      '
    requires_next_action: true
  diagnostic_ablation_audit_only:
    meaning: '원인 분리를 위해 ablation 실험을 실행해야 하는 diagnostic signal이다.

      '
    requires_next_action: true
  diagnostic_integrity_check_only:
    meaning: 'pipeline integrity, leakage, schema join, split 문제가 있는지 확인하는 sanity signal이다.

      '
    requires_next_action: true
entry_validation_policy:
  require_next_action_when_threshold_status_in:
  - diagnostic_trigger_only_not_final_threshold
  - diagnostic_trend_audit_only
  - diagnostic_ablation_audit_only
  - diagnostic_integrity_check_only
  allow_record_only_next_action_when_threshold_status_in:
  - diagnostic_distribution_audit_only
claim_schema:
  required_fields:
  - claim_id
  - claim
  - claim_type
  - status
  - supporting_observations
  - missing_or_weak_observations
  - would_strengthen
  - would_weaken
  - forbidden_interpretation
  allowed_status:
  - diagnostic_support_only
  - deferred
  - superseded
  allowed_claim_types:
  - training_filter_decision
  - raw_pool_expansion_decision
  - preview_renderer_decision
  - campaign_shift_interpretation
  - metric_non_claim_decision
claims:
  exclude_indoor_winter_from_smoke_training:
    claim_id: exclude_indoor_winter_from_smoke_training
    claim_type: training_filter_decision
    status: diagnostic_support_only
    claim: 'phase1b_indoor_gallery_winter_art는 classifier/ranker smoke training 및 evaluation claim에서 제외하고, coverage_gap_diagnostic으로
      보존한다.

      '
    supporting_observations:
    - observed_reject_count: 29
      observed_review_count: 30
      source: phase_1b_first_round_report
    - issue_tags_concentrated_in:
      - season_mismatch
      - semantic_mismatch
    - interpretation: '이 결과는 모델 품질 실패라기보다 현재 raw image pool이 indoor/winter/gallery campaign을 충분히 받쳐주지 못한다는 evidence로 해석한다.

        '
    missing_or_weak_observations:
    - expanded raw pool에서 같은 campaign을 재실험하지 않았다.
    - indoor/winter/gallery campaign family가 1개뿐이다.
    - prompt variant 비교를 아직 하지 않았다.
    - critic/layout signal이 없다.
    would_strengthen:
    - observation: 'indoor/winter/gallery 이미지를 확장한 뒤에도 해당 campaign에서 usable candidate가 낮게 유지된다.

        '
      measurement: usable_candidate_count_after_pool_expansion
      comparison_baseline:
        source: empirical_first_round_observation
        value: 1_of_30_usable
      threshold_status: diagnostic_trigger_only_not_final_threshold
      next_action: 'indoor/winter campaign을 coverage_gap_diagnostic으로 계속 유지한다. prompt revision 외에 raw pool 자체의 확장을 우선순위로 올린다.
        indoor/winter-specific feature나 별도 ontology가 필요한지 검토한다.

        '
    - observation: 'indoor/winter/gallery 후보가 추가되었는데도 retrieval top candidates가 outdoor/garden 계열에 계속 치우친다.

        '
      measurement: top_k_source_group_distribution_after_pool_expansion
      threshold_status: diagnostic_distribution_audit_only
    would_weaken:
    - observation: 'prompt 수정만으로 usable candidate가 크게 증가한다.

        '
      measurement: usable_candidate_count_after_prompt_revision
      comparison_baseline:
        source: empirical_first_round_observation
        value: 1_of_30_usable
      threshold_status: diagnostic_trigger_only_not_final_threshold
      next_action: 'indoor/winter 제외 판단을 재검토한다. raw pool coverage gap보다 prompt design 문제가 주요 원인인지 확인하기 위해 revised prompt set으로
        retrieval과 review queue를 다시 생성한다.

        '
    - observation: 'garden/botanical/architecture campaign에서도 reject rate가 매우 높게 반복된다.

        '
      measurement: reject_rate_by_campaign_family
      interpretation: '이 경우 indoor/winter만의 raw pool coverage gap이 아니라 전반적인 retrieval/review policy 문제일 수 있다.

        '
      threshold_status: diagnostic_distribution_audit_only
    forbidden_interpretation:
    - phase1b_indoor_gallery_winter_art를 모델 품질 실패로 단정하지 않는다.
    - 이 campaign을 삭제하지 않는다.
    - 이 제외 정책을 automatic exclusion rule로 사용하지 않는다.
  prioritize_preview_renderer_v1:
    claim_id: prioritize_preview_renderer_v1
    claim_type: preview_renderer_decision
    status: diagnostic_support_only
    claim: 'raw pool expansion이 현재 blocked인 상태에서, 다음 unblocked task는 preview renderer v1이다.

      '
    supporting_observations:
    - text_region_conflict_count: 1
    - low_contrast_count: 0
    - too_busy_background_count: 0
    - visual_hierarchy_weak_count: 0
    - review_condition: 'Phase 1b first round는 실제 text box overlay 없이 라벨링되었다.

        '
    missing_or_weak_observations:
    - preview renderer를 사용한 review 결과가 아직 없다.
    - layout issue가 실제로 적은지, 관찰 장치가 부족한지 분리되지 않았다.
    - final typography, Korean text rendering, gradient는 아직 포함하지 않는다.
    would_strengthen:
    - observation: 'preview renderer v1 도입 후 layout-related issue_tags가 증가한다.

        '
      measurement: layout_related_issue_tag_count_after_preview_renderer
      comparison_baseline:
        source: empirical_first_round_observation
        value: 1_layout_related_issue_tag
      threshold_status: diagnostic_trigger_only_not_final_threshold
      next_action: 'preview renderer v1을 Phase 1b review workflow에 유지한다. layout-related issue_tags를 ReviewEvent와 TrainingSnapshot
        audit에 별도 집계한다. critic training 후보 label source로 사용할 수 있는지 Phase 2에서 검토한다.

        '
    would_weaken:
    - observation: 'preview renderer v1 도입 후에도 layout-related issue_tags가 거의 증가하지 않는다.

        '
      measurement: layout_related_issue_tag_count_after_preview_renderer
      interpretation: '이 경우 현재 image pool에서는 layout conflict가 실제로 적거나, issue_tags instruction/UI가 여전히 부족할 수 있다.

        '
      threshold_status: diagnostic_distribution_audit_only
    forbidden_interpretation:
    - layout issue가 없다고 단정하지 않는다.
    - preview renderer v1을 final poster renderer로 해석하지 않는다.
    - critic 성능을 주장하지 않는다.
  interpret_architecture_fold_as_campaign_shift:
    claim_id: interpret_architecture_fold_as_campaign_shift
    claim_type: campaign_shift_interpretation
    status: diagnostic_support_only
    claim: 'architecture held-out fold의 낮은 diagnostic score는 production failure가 아니라 campaign shift diagnostic으로 해석한다.

      '
    supporting_observations:
    - heldout_campaign: phase1b_architecture_exhibition_visit
    - balanced_accuracy: 0.35
    - roc_auc: 0.26
    - heldout_label_distribution:
        negative: 10
        positive: 20
    - train_side_family_difference: 'held-out architecture campaign은 garden/botanical 중심 train campaigns와 campaign family가
        다르다.

        '
    missing_or_weak_observations:
    - architecture family campaign이 1개뿐이다.
    - architecture-specific prompt ablation을 하지 않았다.
    - CLIP-only / no-metadata ablation을 하지 않았다.
    - architecture image pool coverage가 충분한지 아직 불명확하다.
    would_strengthen:
    - observation: 'architecture campaign을 추가했을 때도 architecture-family held-out fold가 반복적으로 약하게 나온다.

        '
      measurement: architecture_family_heldout_diagnostic_metrics
      threshold_status: diagnostic_trend_audit_only
      next_action: 'architecture family를 별도 classifier 또는 별도 feature set으로 분리하는 방안을 검토한다. architecture-specific prompt, ontology,
        image pool coverage를 함께 점검한다.

        '
    - observation: 'no-metadata 또는 CLIP-only ablation에서 architecture fold가 회복되지 않는다.

        '
      measurement: ablation_by_feature_group
      interpretation: '이 경우 단순 metadata confounding이 아니라 campaign-family shift 가능성이 커진다.

        '
      threshold_status: diagnostic_ablation_audit_only
      next_action: 'campaign-family conditional feature 또는 별도 architecture classifier를 Phase 2 설계 안에 포함시킨다.

        '
    would_weaken:
    - observation: 'CLIP-only ablation에서 architecture fold가 크게 회복된다.

        '
      measurement: clip_only_vs_all_features_architecture_fold
      interpretation: '이 경우 metadata/path feature confounding이 주요 원인일 수 있다.

        '
      threshold_status: diagnostic_ablation_audit_only
      next_action: 'metadata/path feature를 smoke classifier 기본 feature set에서 분리한다. CLIP-only, no-metadata, metadata-only ablation
        report를 생성하고 architecture fold error rows를 별도 inspect한다.

        '
    - observation: 'architecture prompt 수정만으로 held-out score 또는 usable candidate가 크게 개선된다.

        '
      measurement: architecture_prompt_revision_result
      interpretation: '이 경우 campaign shift가 아니라 prompt design 문제가 주요 원인일 수 있다.

        '
      threshold_status: diagnostic_trigger_only_not_final_threshold
      next_action: 'prompt_template_bank_v1의 architecture 관련 prompt를 revision한다. revised prompt로 retrieval 및 smoke training을
        재실행하고 fold 변화를 비교한다.

        '
    forbidden_interpretation:
    - architecture campaign이 실패했다고 단정하지 않는다.
    - 모델이 architecture를 싫어한다고 해석하지 않는다.
    - roc_auc 0.26을 production metric으로 해석하지 않는다.
  reject_classifier_smoke_as_quality_claim:
    claim_id: reject_classifier_smoke_as_quality_claim
    claim_type: metric_non_claim_decision
    status: diagnostic_support_only
    claim: 'Phase 1b classifier smoke training 결과는 feature plumbing 검증으로만 사용하고, model quality 또는 calibrated threshold claim으로
      사용하지 않는다.

      '
    supporting_observations:
    - filtered_rows: 120
    - campaign_count: 4
    - classifier_label_counts:
        negative: 70
        positive: 50
    - out_of_fold_balanced_accuracy: 0.5786
    - out_of_fold_roc_auc: 0.5977
    - threshold_status: no_calibrated_threshold
    - architecture_fold_is_weak: true
    missing_or_weak_observations:
    - 데이터가 작다.
    - campaign family가 적다.
    - calibration set이 없다.
    - expanded raw pool 결과가 없다.
    - preview renderer 기반 layout label이 없다.
    would_strengthen:
    - observation: '더 많은 campaign과 expanded raw pool에서도 smoke training이 안정적으로 재현된다.

        '
      measurement: repeated_diagnostic_training_runs
      threshold_status: diagnostic_trend_audit_only
      next_action: 'smoke training pipeline을 Phase 2 multi-campaign 환경에서 재실행한다. campaign 수와 label 수가 늘어난 뒤 fold별 diagnostic
        metric 변화를 추적한다.

        '
    would_weaken:
    - observation: 'feature join 또는 campaign-held-out split에서 leakage나 schema 문제가 발견된다.

        '
      measurement: pipeline_integrity_audit
      threshold_status: diagnostic_integrity_check_only
      next_action: 'smoke training 결과를 무효화한다. join key, duplicate_group leakage, campaign split logic을 수정한 뒤 filtered TrainingSnapshot과
        smoke report를 재생성한다.

        '
    forbidden_interpretation:
    - production quality를 주장하지 않는다.
    - automatic accept/reject에 사용하지 않는다.
    - threshold 0.5를 calibrated threshold로 해석하지 않는다.
  monitor_ranker_label_boundary_stability:
    claim_id: monitor_ranker_label_boundary_stability
    claim_type: metric_non_claim_decision
    status: diagnostic_support_only
    claim: Phase 1b ranker label의 acceptable/accept 경계 안정성은 아직 검증되지 않았으므로 ranker metric을 성능 주장으로 사용하지 않는다.
    supporting_observations:
    - ranker_label_counts:
        '0': 70
        '1': 24
        '2': 26
    - note: acceptable(1)과 accept(2)가 24/26으로 거의 같다. 이 비율은 두 레이블의 경계가 reviewer 간 또는 campaign 간에 일관되지 않을 가능성을 시사한다.
    missing_or_weak_observations:
    - multi-annotator overlap에서 acceptable/accept 불일치를 측정하지 않았다.
    - campaign별 acceptable/accept 비율을 비교하지 않았다.
    - ranker label 1/2 경계를 별도 annotation guide로 고정하지 않았다.
    would_strengthen:
    - observation: multi-annotator overlap에서 acceptable/accept 불일치율이 높게 나온다.
      measurement: acceptable_accept_disagreement_rate_in_overlap_set
      threshold_status: diagnostic_trigger_only_not_final_threshold
      next_action: ranker relevance grade 1/2 경계를 재정의한다. 필요하면 acceptable을 ranker positive로 둘지, weak-positive로 둘지, 또는 accept만
        strong-positive로 두는 simplified ranker mapping을 검토한다.
    - observation: campaign별 acceptable/accept 비율이 크게 다르게 나타난다.
      measurement: acceptable_accept_ratio_by_campaign
      threshold_status: diagnostic_distribution_audit_only
      next_action: campaign별 label guide 차이를 기록하고, 다음 audit에서 campaign-family별 acceptable/accept 비율을 비교한다.
    would_weaken:
    - observation: multi-annotator overlap에서 acceptable/accept 불일치율이 낮다.
      measurement: acceptable_accept_disagreement_rate_in_overlap_set
      threshold_status: diagnostic_distribution_audit_only
      next_action: ranker label 1/2 경계가 현재 annotation policy에서 충분히 안정적인지 다음 audit에서 유지 관찰한다.
    forbidden_interpretation:
    - ranker label이 안정적이라고 단정하지 않는다.
    - ranker metric을 production performance로 해석하지 않는다.
    - acceptable과 accept의 현재 비율만으로 ranker grade policy를 확정하지 않는다.

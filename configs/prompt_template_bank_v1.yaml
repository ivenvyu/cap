      - crowded performance stage
      - low quality blurry photo

output_contract:
  positive_prompts_field: clip_positive_prompts
  negative_prompts_field: clip_negative_prompts
  required_downstream_features:
    - clip_positive_max_sim
    - clip_positive_mean_sim
    - clip_negative_max_sim
    - clip_negative_mean_sim
    - clip_margin
    - clip_rank_percentile

notes:
  - >
    This bank is not a general Korean-English translator.
    It maps structured campaign metadata to visual descriptors useful for CLIP retrieval.
  - >
    Sayuwon-specific proper nouns such as Pungseolgicheonnyeon or Orangorang should be
    handled by image_anchor_query in prompt_template_bank_governance_v1 when text prompts
    are insufficient.
  - >
    Prompt changes must be versioned. Existing retrieval results must preserve the prompt
    bank version that generated them.

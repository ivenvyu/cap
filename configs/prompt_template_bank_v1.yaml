      - calm elegant atmosphere
      - refined peaceful visual tone
      - understated premium mood
    negative:
      - loud commercial design
      - flashy event scene
      - cluttered promotional background

  refreshing:
    positive:
      - fresh green atmosphere
      - bright natural freshness
      - clean refreshing nature scene

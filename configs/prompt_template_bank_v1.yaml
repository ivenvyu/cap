metadata:
  spec_version: v2.2.1
  freeze_date: 2026-05-10
  decision_log: docs/design_history/v2_2_1_freeze.md
  status: frozen
  superseded_by: null

name: prompt_template_bank_v1
description: >
  Metadata-driven English visual descriptor bank for CLIP retrieval.
  Korean campaign text should not be sent directly to CLIP as the primary query.
  Campaign metadata is mapped to positive and negative English visual prompts.

prompt_bank_version: prompt_template_bank_v1
language_for_clip_prompts: en
source_language_expected_from_campaign: ko

input_metadata_fields:
  required:
    - purpose_type
    - space_type
    - season
  optional:
    - mood_tags
    - place_name
    - target_channel
    - brand_tone

default_policy:
  positive_prompt_strategy: combine_base_and_mood_prompts
  negative_prompt_strategy: use_purpose_space_season_negatives
  aggregation_for_clip_positive: max_and_mean
  aggregation_for_clip_negative: max_and_mean
  margin_feature: clip_positive_max_sim_minus_clip_negative_max_sim

global_positive_modifiers:
  sayuwon_brand:
    - elegant nature poster background
    - calm premium garden scenery
    - refined peaceful landscape
    - minimal promotional background

global_negative_prompts:
  - crowded commercial advertisement
  - noisy event stage
  - busy urban street
  - low quality blurry photo
  - cluttered background
  - harsh neon lighting
  - black and white documentary photo

